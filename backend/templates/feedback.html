<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback - Collage Library</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* Page Background */
body {
  background: #eae6dd;
  font-family: 'Segoe UI', sans-serif;
}

/* Fix spacing because header is fixed */
.feedback-container {
  max-width: 500px;
  margin: 120px auto;
  text-align: center;
}

/* Title */
.feedback-container h1 {
  font-size: 26px;
  margin-bottom: 5px;
}

/* Subtitle */
.feedback-container p {
  color: #555;
  margin-bottom: 20px;
}

/* Stars */
.stars i {
  font-size: 28px;
  margin: 0 5px;
  cursor: pointer;
  color: #bbb;
  transition: 0.3s;
}

.stars i.active {
  color: #f4c542;
}

/* Textarea */
textarea {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #f5f5f5;
}

/* Button */
.submit-btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #e8c547;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
}

/* Divider */
.divider {
  margin: 30px auto;
  width: 200px;
  height: 1px;
  background: #aaa;
}

/* Social Icons */
.social-icons i {
  font-size: 20px;
  margin: 0 10px;
  cursor: pointer;
  color: #333;
  transition: 0.3s;
}

.social-icons i:hover {
  color: #000;
}

</style>

</head>

<body>

<!-- EXACT SAME NAVBAR FROM INDEX -->
<header class="header">
  <div class="container header-inner">

    <a href="index.html" class="logo">Collage Library</a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-right">

      <nav class="nav" id="nav">
        <ul class="nav-list">
          <li><a href="/home" class="nav-link">Home</a></li>

          <li class="dropdown">
            <a href="#" class="nav-link">Books▾</a>
            <ul class="dropdown-menu">
              <li><a href="#">Browse Books</a></li>
              <li><a href="#">Add Book</a></li>
              <li><a href="#">Book Analytics</a></li>
            </ul>
          </li>

          <li class="dropdown">
            <a href="#" class="nav-link">My Library▾</a>
            <ul class="dropdown-menu">
              <li><a href="#">Issued Books</a></li>
              <li><a href="#">Wishlist</a></li>
            </ul>
          </li>
        </ul>
      </nav>

      <!-- PROFILE -->
      <div class="profile-menu">
        <div class="profile-trigger">👤</div>

        <ul class="profile-dropdown">
          <li><a href="/profile">My Profile</a></li>
          <li><a href="#">My Library</a></li>
          <li><a href="#">Settings</a></li>
          <li><a href="#" onclick="logout(); return false;">Logout</a></li>
        </ul>
      </div>

    </div>
  </div>
</header>

<!--FEEDBACK CONTENT-->
<form id="feedbackForm" class="feedback-container">

  <h1>Please Rate Your Experience</h1>
  <p>to help us serve you better</p>

  <div class="stars" id="stars">
    <i class="fa fa-star" data-value="1"></i>
    <i class="fa fa-star" data-value="2"></i>
    <i class="fa fa-star" data-value="3"></i>
    <i class="fa fa-star" data-value="4"></i>
    <i class="fa fa-star" data-value="5"></i>
  </div>

  <textarea id="comment" rows="5" placeholder="Enter your feedback"></textarea>
  <input type="hidden" id="rating" value="0">
  <button type="submit" class="submit-btn">Send Feedback</button>

  <div class="divider"></div>

  <div class="social-icons">
    <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://twitter.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
  </div>
</form>

<!--REQUIRED SCRIPT-->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<!--<script src="/static/js/script.js"></script>-->
</body>
</html>
