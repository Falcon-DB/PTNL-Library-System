<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BODY */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* NAVBAR */
.header {
  height: 70px;
  display: flex;
  align-items: center;
  background: #f3f1ec;
  padding: 0 40px;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

.nav-list {
  display: flex;
  gap: 20px;
  list-style: none;
}

/* CURVE */
.header-bg {
  height: 180px;
  background: #7ec8c1;
  border-bottom-left-radius: 60% 40%;
  border-bottom-right-radius: 60% 40%;
  position: relative;
  text-align: center;
  padding-top: 20px;
  margin-top: -5px;
}

/* PROFILE IMAGE */
.profile-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid white;
}

/* CONTENT */
.profile-content {
  margin-top: 80px;
  padding: 20px;
}
/* INFO */
.info-text {
  display: flex;
  align-items: center;
  gap: 10px;
}

.info-text span {
  color: #1e3a5f;
  min-width: 130px;
  font-weight: 500;
}

.info-text strong {
  font-weight: 600;
}

/* LOGOUT */
.logout {
  margin-top: 20px;
  width: auto;
  padding: 12px 40px;
  background: #1e3a5f;;
  color: white;
  border: none;
  border-radius: 6px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="header">
  <div class="header-inner">
    <a href="/home" class="logo">College Library</a>

    <nav>
      <ul class="nav-list">
        <li><a href="/home">Home</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- CURVE -->
<div class="header-bg">
  <h3>Profile</h3>
  <img src="{{ url_for('static', filename='images/profile-photo.jpg') }}" class="profile-img">
</div>

<!-- CONTENT -->
<div class="profile-content">

  <div class="info">
  <i class="fa fa-user"></i>
  <div class="info-text">
    <span>Full Name :</span>
    <strong id="name"></strong>
  </div>
</div>

<div class="info">
  <i class="fa fa-envelope"></i>
  <div class="info-text">
    <span>Email :</span>
    <strong id="email"></strong>
  </div>
</div>

<div class="info">
  <i class="fa fa-user-tag"></i>
  <div class="info-text">
    <span>Role :</span>
    <strong id="role"></strong>
  </div>
</div>
  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "/login";
}

document.getElementById("name").innerText = user.full_name;
document.getElementById("email").innerText = user.email;
document.getElementById("role").innerText = user.role || "student";

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/login";
}
</script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
