<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/add_book.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>College Library</h2>

    <a href="/home">Home</a>
    <a href="/profile">My Profile</a>

    <a href="#" class="active">Books</a>
    <a href="#">My Books</a>
    <a href="#">Transactions</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Add New Book</h1>
    </div>

    <!-- FORM -->
    <div class="form-container">

        <!-- FORM TITLE -->
        <h2 style="margin-bottom: 20px; color:#1e293b;">
            Enter Book Details
        </h2>

        <form id="addBookForm">

            <div class="form-grid">

                <!-- AUTHOR -->
                <div class="form-group">
                    <label>Author *</label>
                    <select id="authorSelect" name="author_id" required>
                        <option value="" disabled selected>Select Author</option>
                    </select>

                    <input 
                        type="text" 
                        id="authorInput" 
                        name="author_name"
                        placeholder="Enter new author name"
                        style="display:none; margin-top:10px;"
                    >
                </div>

                <!-- TITLE -->
                <div class="form-group">
                    <label>Title *</label>
                    <input 
                        type="text" 
                        id="title" 
                        placeholder="Enter book title"
                        required
                    >
                </div>

                <!-- EDITION -->
                <div class="form-group">
                    <label>Edition</label>
                    <input 
                        type="text" 
                        id="edition"
                        placeholder="e.g. 2nd Edition"
                    >
                </div>

                <!-- ISBN -->
                <div class="form-group">
                    <label>ISBN</label>
                    <input 
                        type="text" 
                        id="isbn"
                        placeholder="Enter ISBN number"
                    >
                </div>

                <!-- CONDITION -->
                <div class="form-group">
                    <label>Condition *</label>
                    <select id="condition" required>
                        <option value="">Select Condition</option>
                        <option value="new">New</option>
                        <option value="good">Good</option>
                        <option value="old">Old</option>
                    </select>
                </div>

                <!-- PUBLICATION DATE -->
                <div class="form-group">
                    <label>Publication Date</label>
                    <input type="date" id="publicationDate">
                </div>

                <!-- DESCRIPTION -->
                <div class="form-group full">
                    <label>Description</label>
                    <input 
                        type="text"
                        id="description"
                        placeholder="Write a short description about the book..."
                    >
                </div>

            </div>

            <!-- SUBMIT BUTTON -->
            <button type="submit" class="btn">
                Add Book
            </button>

            <!-- MESSAGE -->
            <div id="message" class="message"></div>

        </form>

    </div>

</div>

<!-- JS -->
<script src="/static/js/add_book.js"></script>

</body>
</html>
